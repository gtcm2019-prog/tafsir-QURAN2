<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Index Mushaf - 604 pages</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #facc15;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 10px;
      max-width: 1000px;
      margin: auto;
    }

    .page {
      background: #1e293b;
      padding: 10px;
      text-align: center;
      border-radius: 8px;
      transition: 0.2s;
      text-decoration: none;
      color: white;
      font-weight: bold;
    }

    .page:hover {
      background: #334155;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<h1>📖 Index du Mushaf (604 pages)</h1>

<div class="grid" id="grid"></div>

<script>
  const grid = document.getElementById("grid");

  for (let i = 1; i <= 604; i++) {
    const a = document.createElement("a");
    a.className = "page";
    a.href = `pages/page${i}.html`; // ou .png / .jpg / .pdf
    a.textContent = i;
    grid.appendChild(a);
  }
</script>

</body>
</html>
