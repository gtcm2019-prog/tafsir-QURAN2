<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QCF4 Mushaf</title>

  <style>
    /* ─────────────── BASE ─────────────── */
    body {
      margin: 0;
      background: #f4ecd8;
      color: #000;
      font-family: "Noto Naskh Arabic", serif;
      min-height: 100vh;
    }

    /* ─────────────── TOP BAR ─────────────── */
    .controls {
      position: sticky;
      top: 0;
      background: #efe3c2;
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #d6c6a5;
      z-index: 100;
    }

    label {
      font-family: monospace;
      font-size: 13px;
      margin-right: 8px;
    }

    select {
      padding: 6px 10px;
      font-family: monospace;
      border: 1px solid #c8b58f;
      border-radius: 6px;
      background: #fff;
      color: #000;
      cursor: pointer;
      font-size: 13px;
    }

    select:hover {
      border-color: #8b6f47;
    }

    /* ─────────────── PAGE RENDER ─────────────── */
    #page-render {
      padding: 50px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      max-width: 920px;
      margin: 0 auto;
    }

    /* ligne mushaf */
    .mushaf-line {
      display: flex;
      direction: rtl;
      justify-content: center;
      width: 100%;
      flex-wrap: wrap;
    }

    /* mot */
    .mushaf-word {
      padding: 0 2px;
      font-size: 32px;
      line-height: 2;
      color: #000;
      transition: 0.15s;
      cursor: default;
    }

    /* hover */
    .mushaf-word:hover {
      color: #b38b2a;
      background: rgba(179, 139, 42, 0.08);
      border-radius: 3px;
    }

    /* loader */
    .loader {
      padding: 60px 20px;
      text-align: center;
      color: #8b6f47;
      font-family: monospace;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #d6c6a5;
      border-top-color: #b38b2a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      color: #c84c3c;
      padding: 40px 20px;
      text-align: center;
      font-family: monospace;
      font-size: 13px;
    }

    /* tooltip */
    .tooltip {
      position: fixed;
      background: #fff;
      border: 1px solid #c8b58f;
      border-radius: 4px;
      padding: 6px 10px;
      font-family: monospace;
      font-size: 11px;
      color: #000;
      pointer-events: none;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.15s;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .tooltip.visible { opacity: 1; }
    .tooltip strong { color: #b38b2a; }

    @media (max-width: 600px) {
      #page-render { padding: 20px 12px; }
      .mushaf-word { font-size: 24px; }
    }
  </style>
</head>

<body>

<!-- 🎛 SELECT PAGE -->
<div class="controls">
  <label>Page:</label>
  <select id="page-select"></select>
</div>

<!-- 📖 RENDER AREA -->
<div id="page-render"></div>

<!-- tooltip -->
<div class="tooltip" id="tooltip"></div>

<script>

/* ─────────────── SOURCES LOCAL ─────────────── */
const DATA_PATH  = "pages";
const FONTS_PATH = "fonts-woff2";

const loadedFonts = new Set();

/* ─────────────── LOAD FONT ─────────────── */
async function loadFont(fontName) {
  if (loadedFonts.has(fontName)) return;

  const file = fontName === "QCF4_QBSML"
    ? `${fontName}.woff2`
    : `${fontName}_W.woff2`;

  const url = `${FONTS_PATH}/${file}`;

  try {
    const ff = new FontFace(fontName, `url(${url})`);
    await ff.load();
    document.fonts.add(ff);
    loadedFonts.add(fontName);
  } catch(e) {
    console.warn("Font failed:", fontName);
  }
}

/* ─────────────── LOAD PAGE ─────────────── */
async function loadPage(page) {
  const padded = String(page).padStart(3, "0");
  const container = document.getElementById("page-render");

  // Show loader
  container.innerHTML = `
    <div class="loader">
      <div class="spinner"></div>
      <div>Loading page ${padded}…</div>
    </div>
  `;

  try {
    // Try multiple paths
    let data = null;
    const paths = [
      `${DATA_PATH}/${padded}.json`,
      `pages/${padded}.json`,
      `./pages/${padded}.json`
    ];

    for (const path of paths) {
      try {
        const res = await fetch(path);
        if (res.ok) {
          data = await res.json();
          break;
        }
      } catch(e) {}
    }

    if (!data) {
      throw new Error("Page not found. Make sure pages/ folder exists.");
    }

    await renderPage(data);
  } catch(e) {
    container.innerHTML = `<div class="error">❌ ${e.message}</div>`;
  }
}

/* ─────────────── RENDER PAGE ─────────────── */
async function renderPage(data) {
  const container = document.getElementById("page-render");
  container.innerHTML = "";

  // Collect fonts
  const fonts = new Set();
  fonts.add(data.font);

  data.lines.forEach(line => {
    line.words.forEach(word => {
      fonts.add(word.font);
    });
  });

  // Load fonts
  await Promise.all([...fonts].map(loadFont));

  // Render
  data.lines.forEach(line => {
    const row = document.createElement("div");
    row.className = "mushaf-line";

    line.words.forEach(word => {
      const span = document.createElement("span");
      span.className = "mushaf-word";
      span.textContent = word.char;
      span.style.fontFamily = `"${word.font}"`;

      // Tooltip
      span.addEventListener("mousemove", (e) => {
        const t = document.getElementById("tooltip");
        let info = `<strong>${word.type}</strong>`;
        if (word.verse_key) info += ` · ${word.verse_key}`;
        if (word.text) info += ` · ${word.text}`;
        t.innerHTML = info;
        t.style.left = (e.clientX + 12) + "px";
        t.style.top = (e.clientY + 12) + "px";
        t.classList.add("visible");
      });

      span.addEventListener("mouseleave", () => {
        document.getElementById("tooltip").classList.remove("visible");
      });

      row.appendChild(span);
    });

    container.appendChild(row);
  });
}

/* ─────────────── INIT SELECT ─────────────── */
const sel = document.getElementById("page-select");

for (let i = 1; i <= 604; i++) {
  const opt = document.createElement("option");
  opt.value = i;
  opt.textContent = String(i).padStart(3, "0");
  sel.appendChild(opt);
}

sel.value = 562;
sel.addEventListener("change", () => {
  loadPage(sel.value);
});

/* ─────────────── START ─────────────── */
loadPage(562);

</script>

</body>
</html>
